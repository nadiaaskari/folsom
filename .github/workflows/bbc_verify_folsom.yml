name: BBC Verify - Folsom Guava

on: workflow_dispatch

jobs:

  candidate1-build1-baseline:
    name: "C1 Guava 18→19 | Build 1 Baseline"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 9a4fcaff5cea1744cf33dc3a95460abf1343fe37~1
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2
      - name: Run baseline tests
        run: mvn clean test -fae -Dcheckstyle.skip=true

  candidate1-build2-pomonly:
    name: "C1 Guava 18→19 | Build 2 Pom Only"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 9a4fcaff5cea1744cf33dc3a95460abf1343fe37~1
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2
      - name: Bump Guava to 19.0
        run: sed -i 's/<guava.version>18.0<\/guava.version>/<guava.version>19.0<\/guava.version>/g' pom.xml
      - name: Run pom-only tests
        run: mvn clean test -fae -Dcheckstyle.skip=true

  candidate1-build3-adapted:
    name: "C1 Guava 18→19 | Build 3 Adapted"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 9a4fcaff5cea1744cf33dc3a95460abf1343fe37
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2
      - name: Run adapted tests
        run: mvn clean test -fae -Dcheckstyle.skip=true

  candidate2-build1-baseline:
    name: "C2 Guava 24→28 | Build 1 Baseline"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 170275a7a47fd396c737677f8e8c7967009999f4~1
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2
      - name: Run baseline tests
        run: mvn clean test -fae -Dcheckstyle.skip=true

  candidate2-build2-pomonly:
    name: "C2 Guava 24→28 | Build 2 Pom Only"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 170275a7a47fd396c737677f8e8c7967009999f4~1
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2
      - name: Bump Guava to 28.0-android
        run: sed -i 's/24.1-jre/28.0-android/g' folsom/pom.xml
      - name: Run pom-only tests
        run: mvn clean test -fae -Dcheckstyle.skip=true

  candidate2-build3-adapted:
    name: "C2 Guava 24→28 | Build 3 Adapted"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 170275a7a47fd396c737677f8e8c7967009999f4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2
      - name: Run adapted tests
        run: mvn clean test -fae -Dcheckstyle.skip=true