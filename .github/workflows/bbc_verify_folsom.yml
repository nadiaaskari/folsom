candidate2-build1-baseline:
    name: "C2 Guava 24→28 | Build 1 Baseline"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 97af2cb545fa0ce46602b1444c77e83e1bc7fb8e
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-c2
      - name: Run baseline tests
        run: |
          mvn clean test -fae \
            -Dcheckstyle.skip=true \
            -DfailIfNoTests=false \
            -pl folsom

  candidate2-build2-pomonly:
    name: "C2 Guava 24→28 | Build 2 Pom Only"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 97af2cb545fa0ce46602b1444c77e83e1bc7fb8e
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-c2
      - name: Bump Guava 24.1-jre to 28.0-android
        run: sed -i 's/24.1-jre/28.0-android/g' folsom/pom.xml
      - name: Run pom-only tests
        run: |
          mvn clean test -fae \
            -Dcheckstyle.skip=true \
            -DfailIfNoTests=false \
            -pl folsom

  candidate2-build3-adapted:
    name: "C2 Guava 24→28 | Build 3 Adapted"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 170275a7a47fd396c737677f8e8c7967009999f4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-c2
      - name: Run adapted tests
        run: |
          mvn clean test -fae \
            -Dcheckstyle.skip=true \
            -DfailIfNoTests=false \
            -pl folsom